name: Auto Merge Claude Branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git checkout main

          if git merge --no-commit --no-ff "origin/$BRANCH"; then
            git commit --no-edit
          else
            echo "Merge conflict detected."
            mapfile -t UNMERGED < <(git diff --name-only --diff-filter=U)
            printf 'Unmerged files:\n%s\n' "${UNMERGED[@]}"

            ALLOWED=("src/config/version.ts" "src/config/changelog.ts")
            for file in "${UNMERGED[@]}"; do
              if [[ ! " ${ALLOWED[*]} " =~ " ${file} " ]]; then
                echo "Conflict includes non-metadata file: $file"
                exit 1
              fi
            done

            echo "Only metadata files conflicted. Auto-resolving with main branch versions."
            git checkout --ours src/config/version.ts src/config/changelog.ts
            git add src/config/version.ts src/config/changelog.ts
            git commit -m "Merge origin/$BRANCH into main (auto-resolve metadata conflicts)"
          fi

          git push origin main
